<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EVO FITNESS • Loja</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');
    body { font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
    .search-input:focus { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
  </style>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100">

  <header class="fixed top-0 left-0 right-0 bg-zinc-900/80 backdrop-blur-xl border-b border-zinc-800 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <button onclick="window.location.href='Index.html'" class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400 active:scale-95 transition">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h1 class="text-2xl font-bold tracking-tighter text-white">EVO <span class="text-emerald-400">STORE</span></h1>
      <div class="w-10"></div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto pt-24 px-4 pb-20">
    
    <!-- BUSCA E FILTROS -->
    <div class="mb-8 space-y-4">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
        <input type="text" id="input-busca" oninput="filtrarLoja()" placeholder="Buscar suplementos, luvas..." class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-4 pl-12 pr-4 text-white focus:outline-none focus:border-emerald-500 transition search-input">
      </div>
      
      <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
        <button onclick="filtrarCategoria('Todos')" class="cat-btn px-6 py-2 rounded-full bg-emerald-600 text-white font-bold whitespace-nowrap text-sm transition">Todos</button>
        <button onclick="filtrarCategoria('Pre-Treino')" class="cat-btn px-6 py-2 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 whitespace-nowrap text-sm transition">Pré-Treino</button>
        <button onclick="filtrarCategoria('Pos-Treino')" class="cat-btn px-6 py-2 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 whitespace-nowrap text-sm transition">Pós-Treino</button>
        <button onclick="filtrarCategoria('Equipamento')" class="cat-btn px-6 py-2 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 whitespace-nowrap text-sm transition">Equipamentos</button>
      </div>
    </div>

    <div id="grid-produtos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
        <!-- Injetado via JS -->
    </div>

    <div id="no-results" class="hidden text-center py-20">
        <i class="fa-solid fa-box-open text-5xl text-zinc-800 mb-4"></i>
        <p class="text-zinc-500">Nenhum produto encontrado.</p>
    </div>

  </main>

  <script type="module">
    import { DB } from './bd.js';
    let produtos = [];
    let filtroCat = "Todos";

    async function init() {
        produtos = await DB.getProdutos();
        renderizar();
    }

    window.filtrarCategoria = (cat) => {
        filtroCat = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            if(btn.textContent.includes(cat) || (cat === 'Todos' && btn.textContent === 'Todos')) {
                btn.className = "cat-btn px-6 py-2 rounded-full bg-emerald-600 text-white font-bold whitespace-nowrap text-sm transition";
            } else {
                btn.className = "cat-btn px-6 py-2 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 whitespace-nowrap text-sm transition";
            }
        });
        filtrarLoja();
    }

    window.filtrarLoja = () => {
        const busca = document.getElementById('input-busca').value.toLowerCase();
        const listaFiltrada = produtos.filter(p => {
            const bateNome = p.nome.toLowerCase().includes(busca);
            const bateCat = filtroCat === "Todos" || p.categoria === filtroCat;
            return bateNome && bateCat;
        });
        renderizar(listaFiltrada);
    }

    function renderizar(dados = produtos) {
        const container = document.getElementById('grid-produtos');
        const noRes = document.getElementById('no-results');
        
        if(dados.length === 0) {
            container.innerHTML = "";
            noRes.classList.remove('hidden');
            return;
        }

        noRes.classList.add('hidden');
        container.innerHTML = dados.map(p => `
            <div class="bg-zinc-900 rounded-[2rem] p-5 border border-zinc-800 flex flex-col group hover:border-emerald-500/50 transition duration-300">
                <div class="w-full aspect-square bg-zinc-950 rounded-2xl mb-4 overflow-hidden border border-zinc-800/50">
                    <img src="${p.foto}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" onerror="this.src='https://placehold.co/400x400/18181b/emerald?text=Produto'">
                </div>
                <div class="flex-1">
                    <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">${p.categoria}</span>
                    <h3 class="text-lg font-bold text-white mb-1 line-clamp-1">${p.nome}</h3>
                    <p class="text-2xl font-bold text-white mt-3">R$ ${p.preco.toFixed(2)}</p>
                </div>
                <a href="${p.link}" target="_blank" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold text-white text-center transition active:scale-95 shadow-lg shadow-emerald-900/20 mt-4">
                    Comprar Agora
                </a>
            </div>
        `).join('');
    }

    init();
  </script>
</body>
</html>
